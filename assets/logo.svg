<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#232533" />
            <stop offset="100%" stop-color="#12131a" />
        </linearGradient>

        <!-- Box Outline Gradient -->
        <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
            <stop offset="100%" stop-color="#9333EA" /> <!-- Purple -->
        </linearGradient>

        <!-- Arrows & Progress Gradient (FFmpeg Green/Cyan Vibe) -->
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan -->
            <stop offset="100%" stop-color="#10b981" /> <!-- Emerald -->
        </linearGradient>

        <!-- Glow Filter for Arrows -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- App Icon Base (Squircle) -->
    <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)" stroke="#313442"
        stroke-width="4" />

    <!-- The "Box" Outline -->
    <rect x="116" y="106" width="280" height="300" rx="48" fill="none" stroke="url(#boxGrad)"
        stroke-width="24" stroke-linecap="round" />

    <!-- The "FF" (Fast Forward Arrows) -->
    <!-- Using paths with thick strokes to get beautifully rounded triangles -->
    <g filter="url(#glow)">
        <path class="ff-arrow arrow-1" d="M 186 170 L 260 226 L 186 282 Z" fill="url(#accentGrad)"
            stroke="url(#accentGrad)" stroke-width="20" stroke-linejoin="round" />
        <path class="ff-arrow arrow-2" d="M 252 170 L 326 226 L 252 282 Z" fill="url(#accentGrad)"
            stroke="url(#accentGrad)" stroke-width="20" stroke-linejoin="round" />
    </g>

    <!-- Progress Bar Track -->
    <line x1="160" y1="346" x2="352" y2="346" stroke="#2A2A3A" stroke-width="16"
        stroke-linecap="round" />

    <!-- Progress Bar Fill (Animated) -->
    <line class="progress-fill" x1="160" y1="346" x2="352" y2="346" stroke="url(#accentGrad)"
        stroke-width="16" stroke-linecap="round" />
</svg>