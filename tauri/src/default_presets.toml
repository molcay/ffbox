[[presets]]
name = "H.264 Fast 1080p (MP4)"
extension = "mp4"
args = [
    "-c:v", "libx264",
    "-preset", "fast",
    "-crf", "23",
    "-vf", "scale=-2:1080",
    "-c:a", "aac",
    "-b:a", "192k"
]

[[presets]]
name = "H.265 High Quality (MKV)"
extension = "mkv"
args = [
    "-c:v", "libx265",
    "-preset", "medium",
    "-crf", "28",
    "-c:a", "copy"
]

[[presets]]
name = "Extract Audio (MP3)"
extension = "mp3"
args = [
    "-q:a", "0",
    "-map", "a"
]

[[presets]]
name = "Web Optimized (MP4)"
extension = "mp4"
args = [
    "-c:v", "libx264",
    "-profile:v", "main",
    "-level", "4.0",
    "-preset", "fast",
    "-crf", "24",
    "-movflags", "+faststart",
    "-c:a", "aac"
]

[[presets]]
name = "Lossless Archival (MKV)"
extension = "mkv"
args = [
    "-c:v", "libx264",
    "-preset", "veryslow",
    "-crf", "0",
    "-c:a", "flac"
]

[[presets]]
name = "Video: MP4 Stream copy"
extension = "mp4"
args = ["-c", "copy"]

[[presets]]
name = "Video: Convert audio track to AAC HQ 2 channels"
extension = "mkv"
args = ["-c:v", "copy", "-c:a", "aac", "-cutoff", "20K", "-b:a", "256K", "-ac", "2"]

[[presets]]
name = "Video: Convert audio tracks to AC3 2 channels"
extension = "mkv"
args = ["-c:v", "copy", "-c:a", "ac3", "-b:a", "256K", "-ac", "2", "-c:s", "copy"]

[[presets]]
name = "Video: Convert to ProRes MKV"
extension = "mkv"
args = ["-c:v", "prores_ks", "-profile:v", "standard", "-vendor:v", "ap10", "-pix_fmt", "yuv422p10le", "-c:a", "pcm_s16le", "-chunk_size", "64K"]

[[presets]]
name = "Video: Convert to H264 HQ + Source Audio"
extension = "mkv"
args = ["-c:v", "libx264", "-crf", "20", "-c:a", "copy"]

[[presets]]
name = "Video: Convert to H264 Ultrafast"
extension = "mkv"
args = ["-c:v", "libx264", "-crf", "23", "-preset", "ultrafast", "-c:a", "copy"]

[[presets]]
name = "Video: Convert to H265 HQ + Source Audio"
extension = "mkv"
args = ["-c:v", "libx265", "-crf", "23", "-c:a", "copy"]

[[presets]]
name = "Video: Resize 1280x720 H264-AAC"
extension = "mp4"
args = ["-c:v", "libx264", "-crf", "23", "-vf", "scale=1280:720", "-c:a", "aac", "-b:a", "128K"]

[[presets]]
name = "Video: Rotate 90 degrees Clockwise to H264 + Source audio"
extension = "mp4"
args = ["-c:v", "libx264", "-crf", "21", "-vf", "transpose=1", "-c:a", "copy"]

[[presets]]
name = "Video: Rotate 90 degrees CountercLockwise and Vertical Flip to H264 + Source audio"
extension = "mp4"
args = ["-c:v", "libx264", "-crf", "21", "-vf", "transpose=0", "-c:a", "copy"]

[[presets]]
name = "Video: Rotate 90 degrees CounterClockwise to H264 + Source audio"
extension = "mp4"
args = ["-c:v", "libx264", "-crf", "21", "-vf", "transpose=2", "-c:a", "copy"]

[[presets]]
name = "Video: Rotate 90 degrees Clockwise and Vertical Flip to H264 + Source audio"
extension = "mp4"
args = ["-c:v", "libx264", "-crf", "21", "-vf", "transpose=3", "-c:a", "copy"]

[[presets]]
name = "Video: Rotate 180 degrees to H264 + Source audio"
extension = "mp4"
args = ["-c:v", "libx264", "-crf", "21", "-vf", "transpose=2, transpose=2", "-c:a", "copy"]

[[presets]]
name = "Video: Remove subtitles to MP4"
extension = "mp4"
args = ["-c", "copy", "-sn"]

[[presets]]
name = "Audio: Convert to FLAC 16/44,1KHz 2 channels"
extension = "flac"
args = ["-vn", "-c:a", "flac", "-ar", "44100", "-sample_fmt", "s16", "-ac", "2"]

[[presets]]
name = "Audio: Convert to MP3 VBR HQ 2 ch embedded cover"
extension = "mp3"
args = ["-c:v", "copy", "-c:a", "libmp3lame", "-qscale:a", "0", "-ac", "2"]

[[presets]]
name = "Audio: Convert to MP3 VBR HQ 2 ch"
extension = "mp3"
args = ["-vn", "-c:a", "libmp3lame", "-qscale:a", "1", "-ac", "2"]

[[presets]]
name = "Audio: Convert to MP3 CBR HQ 2 ch"
extension = "mp3"
args = ["-vn", "-c:a", "libmp3lame", "-b:a", "224K", "-ac", "2"]

[[presets]]
name = "Audio: Convert to WAV 16/44,1KHz 2 channels"
extension = "wav"
args = ["-vn", "-c:a", "pcm_s16le", "-ar", "44100", "-sample_fmt", "s16", "-ac", "2"]

[[presets]]
name = "Subtitle: Extract first subtitle track to SRT"
extension = "srt"
args = ["-map", "0:2", "-c:s", "copy"]

[[presets]]
name = "Image: Extract frame as image"
extension = "png"
args = ["-vframes", "1", "-f", "image2"]

[[presets]]
name = "Video: Encode AMD-VCE H264 HQ + Source Audio"
extension = "mkv"
args = ["-c:v", "h264_amf", "-rc", "cqp", "-qp_p", "20", "-qp_i", "20", "-qp_b", "20", "-c:a", "copy"]

[[presets]]
name = "Video: Encode AMD-VCE HEVC HQ + Source Audio"
extension = "mkv"
args = ["-c:v", "hevc_amf", "-rc", "cqp", "-qp_p", "20", "-qp_i", "20", "-qp_b", "20", "-c:a", "copy"]

[[presets]]
name = "Record screen at 24 fps + Audio AAC to MKV"
extension = "mkv"
args = ["-r", "24", "-c:a", "aac", "-b:a", "128K"]

[[presets]]
name = "Record screen at 15 fps 1280x720 + Audio to MKV"
extension = "mkv"
args = ["-r", "15", "-vf", "scale=1280x720", "-c:a", "aac", "-b:a", "128K"]

[[presets]]
name = "Record screen at 30 fps Nvidia NVENC + Audio AAC to MKV"
extension = "mkv"
args = ["-c:v", "h264_nvenc", "-qp", "20", "-r", "30", "-c:a", "aac", "-b:a", "128K"]

[[presets]]
name = "Record screen at 25 fps Intel QuickSync + Audio AAC to MKV"
extension = "mkv"
args = ["-c:v", "h264_qsv", "-qp", "20", "-r", "25", "-c:a", "aac", "-b:a", "128K"]

[[presets]]
name = "Join images at 1920px width to MP4 video"
extension = "mp4"
args = ["-c:v", "libx264", "-preset", "veryfast", "-vf", "fps=25,format=yuv420p,scale=1920:-2", "-c:a", "aac", "-b:a", "64K"]
